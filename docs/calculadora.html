<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Rollover OFICIAL - CasinoRadar</title>
    <meta name="description" content="Calcule seu rollover de cassino e descubra as melhores ofertas de bônus.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #d4af37;
            --primary-light: #e5c158;
            --text-primary: #e5e7eb;
            --bg-darker: #0a0e18;
            --card-bg: rgba(26, 31, 58, 0.95);
        }
        body {
            background: linear-gradient(135deg, var(--bg-darker) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { padding: 20px 0; border-bottom: 1px solid rgba(212, 175, 55, 0.2); margin-bottom: 30px; text-align: center; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); text-decoration: none; }
        h1 { font-size: 28px; color: var(--primary); text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #9ca3af; margin-bottom: 30px; }
        
        .calc-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }
        @media (max-width: 768px) { .calc-container { grid-template-columns: 1fr; } }

        .box { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #9ca3af; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #000; color: var(--primary); border: 1px solid #333; border-radius: 8px; font-size: 18px; font-weight: bold; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; }
        
        .result-val { font-size: 32px; font-weight: 900; color: #34d399; margin-bottom: 10px; }
        
        .affiliate-section { margin-top: 40px; }
        .affiliate-title { font-size: 22px; color: var(--primary); text-align: center; margin-bottom: 20px; font-weight: 800; }
        .affiliate-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .affiliate-card { 
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(0, 0, 0, 0.4) 100%);
            padding: 20px; border-radius: 12px; border: 2px solid var(--primary); text-align: center;
            transition: 0.3s;
        }
        .affiliate-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        .aff-name { font-size: 20px; font-weight: 800; margin-bottom: 5px; }
        .aff-bonus { color: #34d399; font-weight: 700; margin-bottom: 15px; display: block; }
        .aff-link { 
            display: block; width: 100%; padding: 12px; background: #34d399; color: #000; 
            text-decoration: none; border-radius: 8px; font-weight: 800; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header><a href="/casino-radar.github.io/" class="logo">♠ CasinoRadar</a></header>
    <div class="container">
        <h1>Calculadora de Rollover OFICIAL</h1>
        <p class="subtitle">Calcule e escolha os melhores bônus</p>

        <div class="calc-container">
            <div class="box">
                <div class="input-group">
                    <label>Valor do Bônus (R$)</label>
                    <input type="number" id="val" value="100">
                </div>
                <div class="input-group">
                    <label>Rollover (x)</label>
                    <input type="number" id="roll" value="35">
                </div>
                <button class="btn-main" onclick="calc()">CALCULAR AGORA</button>
            </div>
            <div class="box" style="display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                <label>Total a Apostar</label>
                <div class="result-val" id="res">R$ 3.500,00</div>
                <p id="tip" style="color: #9ca3af; font-size: 14px;">⚠️ Rollover moderado.</p>
            </div>
        </div>

        <div class="affiliate-section">
            <h2 class="affiliate-title">💎 MELHORES CASSINOS COM BÔNUS REAL</h2>
            <div class="affiliate-grid">
                <div class="affiliate-card">
                    <div class="aff-name">Apostou</div>
                    <span class="aff-bonus">Bônus de Boas-vindas</span>
                    <a href="https://apretailer.com.br/click/6a16415e2bfa810b4d7005e0/188656/358980/subaccount" target="_blank" class="aff-link">JOGAR AGORA</a>
                </div>
                <div class="affiliate-card">
                    <div class="aff-name">SauroPlay</div>
                    <span class="aff-bonus">200% até R$ 1.000</span>
                    <a href="https://apretailer.com.br/click/6a16415e2bfa810b476e9fdc/188634/358980/subaccount" target="_blank" class="aff-link">PEGAR BÔNUS</a>
                </div>
                <div class="affiliate-card">
                    <div class="aff-name">KTO</div>
                    <span class="aff-bonus">Bônus Sem Rollover</span>
                    <a href="https://apretailer.com.br/click/6a16415d2bfa810b4d7005de/188552/358980/subaccount" target="_blank" class="aff-link">CRIAR CONTA</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calc() {
            const v = document.getElementById('val').value;
            const r = document.getElementById('roll').value;
            const t = v * r;
            document.getElementById('res').innerText = 'R$ ' + t.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            let tip = '';
            if (r <= 20) tip = '✅ Rollover baixo! Fácil de cumprir.';
            else if (r <= 35) tip = '⚠️ Rollover moderado.';
            else tip = '❌ Rollover alto. Cuidado!';
            document.getElementById('tip').innerText = tip;
        }
    </script>
</body>
</html>
